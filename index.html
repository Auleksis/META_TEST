<meta property="og:description" content="Тостер&nbsp;—&nbsp;это компактный прибор для поджаривания ломтиков хлеба. При выборе стоит учитывать такие параметры, как вместимость, мощность, тип управления, материал корпуса и дополнительные функции [1][3].

## Вместимость

По количеству секций тостеры делятся на два типа:
* **Двухкамерные.** Классический вариант для одного человека или небольшой семьи [3].
* **Четырёхкамерные.** Подойдут для больших семей, а также в том случае, если вы часто принимаете гостей или готовите тосты впрок [3].

## Мощность

Чем выше мощность, тем быстрее готовится тост. Рекомендуемые значения:
* 800&nbsp;Вт&nbsp;—&nbsp;экономичные в плане потребления электричества, но медленные модели&nbsp;—&nbsp;поджаривают хлеб за&nbsp;90–120&nbsp;секунд в зависимости от программы;
* 900–1000&nbsp;Вт&nbsp;—&nbsp;оптимальные по соотношению скорости и экономичности тостеры&nbsp;—&nbsp;хлеб поджаривается примерно за&nbsp;60&nbsp;секунд;
* от&nbsp;1000&nbsp;Вт&nbsp;—&nbsp;быстрые модели&nbsp;—&nbsp;поджаривают хлеб за&nbsp;30–60&nbsp;секунд [9].

## Тип управления

Подразделяется на:
* **Механическое.** Самый простой и бюджетный вариант. Предполагает наличие механических кнопок, рычагов и поворотных переключателей [1].
* **Электронное.** Управление прибором осуществляется при помощи кнопок. Зачастую модели этой категории имеют электронную индикацию для большей информативности и дисплей, на котором отображаются текущие параметры работы, в том числе время [1].
* **Сенсорное.** Является разновидностью предыдущего варианта. Панель с сенсорными датчиками срабатывает при лёгком прикосновении [1].

## Материал корпуса

По этой характеристике выделяют два вида:
* **Пластиковые.** Пластик&nbsp;—&nbsp;лёгкий и бюджетный материал, который легко очищается при помощи губки или салфетки. Cтенки из пластика плохо пропускают тепло, за счёт чего корпус устройства сильно не нагревается [1].
* **Металлические.** Такой корпус прочнее и устойчивее к деформациям, появлению царапин (если только специально не тереть его абразивными щётками), механическому воздействию. Правда, на глянцевой металлической поверхности остаются следы от пальцев, которые не всегда легко удаляются. Кроме того, металл может сильно нагреваться, поэтому предпочтение следует отдать корпусам с термоизоляцией, которая не даёт внешней поверхности сильно нагреваться [1].

## Дополнительные функции
* **Разморозка.** Позволяет сразу готовить замороженный хлеб без предварительного оттаивания, экономит время и сохраняет текстуру [3].
* **Подогрев.** Возвращает хруст остывшим тостам или разогревает другую выпечку, если есть специальная решётка [3].
* **Одностороннее обжаривание.** В этом режиме одна сторона хлеба останется мягкой, без корочки. Это позволяет дополнить бутерброд практически любой начинкой [1].
* **Автоматическое центрирование тостов.** Специальный механизм, который самостоятельно выравнивает кусочки хлеба в слотах вне зависимости от их формы и размеров. Это обеспечивает более равномерную прожарку с обеих сторон ломтика [4].
* **Экстраподъём маленьких кусочков хлеба.** Обеспечит безопасное извлечение мелких ломтиков из горячей зоны прибора. После отключения достаточно немного приподнять загрузочный рычаг [4].
